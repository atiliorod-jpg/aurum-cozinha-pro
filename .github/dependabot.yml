# Abre PRs semanais para dependências desatualizadas/vulneráveis.
# Obs.: o xlsx vem da dist oficial do SheetJS (cdn.sheetjs.com), fora do npm —
# o Dependabot não o acompanha; conferir atualizações manualmente de vez em quando.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-e-patch:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
